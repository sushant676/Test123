name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Current Directory
        run: pwd

      - name: Show Files
        run: ls -la

      - name: Success Message
        run: echo "CI/CD Pipeline Working Successfully"
